# Title of your website
title: 'TSE 2026'

# The slogan describes your website and is used on homepage in <title> and other important places
slogan: '2026 Intl. Conf. on Advanced Technologies for Search & Rescue and Emergency Response Systems (TSE 2026)'

# The description is used on homepage and in the footer to quickly describe your website. Use a maximum of 150 characters for SEO-purposes.
description: 'The 2026 International Conference on Advanced Technologies for Search & Rescue and Emergency Response Systems (TSE 2026)'

# The credits show up in the includes/_footer.html – It would be nice of you to leave a link to Phlow or Feeling Responsive as a thank you :)
credits: '<p>Based on <a href="http://phlow.github.io/feeling-responsive/">Feeling Responsive</a> theme by phlow.</p>'

# The conference date show up in the includes/_masterhead.html
date: "November 26-28, 2026"
# submission_date: "<del>February 28, 2025</del> <span style=\"color: red;\">March 30, 2025 (hard deadline)</span>"
# acceptance_date: "<del>March 25</del> <del>April 20</del> <span style=\"color: red;\">April 29, 2025</span>"
# camera_ready_date: "<del>April 2</del> <del>May 1</del> <span style=\"color: red;\">May 6, 2025</span>"
# advance_reg_date: "<del>April 2</del> <del>May 1</del> <span style=\"color: red;\">May 6, 2025</span>"

submission_date: "September 15, 2026"
acceptance_date: "October 15, 2026"
camera_ready_date: "October 30, 2026"
advance_reg_date: "October 30, 2026"

# submission_link: "https://edas.info/N33433"
submission_link: "TBD"

location: "Hanoi, Vietnam"

organized_by: "Le Quy Don Technical University (LQDTU)"
cohosted_by: ""
conf_info: >
  <span> The 2026 International Conference on Advanced Technologies
  for Search & Rescue and Emergency Response Systems (TSE 2026)
  provides a forum for exchanging ideas, discussing research results,
  and presenting cutting-edge innovations at the intersection of
  science, technology, and emergency management. The conference brings
  together researchers, engineers, practitioners, policymakers, and
  industry leaders from around the world to address the increasingly
  complex challenges of search and rescue operations and emergency
  response in the modern era.
  The TSE 2026 will be held in Hanoi, Vietnam. Further information about the conference, paper submission guidelines and templates will be updated on www.tse.lqdtu.edu.vn</span></br>

  <span><b>Paper submission</b></span></br>

  <span>Prospective authors are invited to submit full-length
  manuscripts (4-6 pages), including figures, tables and references,
  to the official TSE 2026 website. All papers will be handled
  electronically. Accepted and presented papers will be included in
  the conference proceedings with ISBN. Papers are solicited in the
  following categories, but are not limited to: </span>

# Main author of the website
# See > authors.yml
author: TSE

# This URL is the main address for absolute links. Don't include a slash at the end.
#
url: 'https://www.tse.lqdtu.edu.vn'
# url: 'https://icdv-2025.s3-website-ap-southeast-1.amazonaws.com'
# url: 'http://icdv-conf.org.s3-website-ap-southeast-1.amazonaws.com'
baseurl: ''

# This is for the editing function in _/includes/improve_content
# Leave it empty if your site is not on GitHub/GitHub Pages
improve_content: 

# This URL points directly to the images directory making
# things easier to link to images in posts and templates. It needs a slash at the end.
#
# Example: <img src="{{ site.urlimg }}{{ post.image.title }}" />
# Markdown-Example for posts ![Image Text]({{ site.urlimg }}image.jpg)
#
urlimg: '/images/'


# Logo size is 600x80 pixels
logo: "logo.png"

# Plugins
plugins:
    - jekyll-asciidoc
    - jekyll-gist
    - jekyll-paginate


#       ____              _             __  _
#      / __ \____ _____ _(_)___  ____ _/ /_(_)___  ____
#     / /_/ / __ `/ __ `/ / __ \/ __ `/ __/ / __ \/ __ \
#    / ____/ /_/ / /_/ / / / / / /_/ / /_/ / /_/ / / / /
#   /_/    \__,_/\__, /_/_/ /_/\__,_/\__/_/\____/_/ /_/
#               /____/
#
paginate: 5                      # Paginates all X entries
paginate_path: "blog/page:num"   # Pagination path › Important for blog page in /blog/ to work


# Theme works best with Kramdown (using the table of contents function)
markdown           : kramdown
permalink          : /:categories/:title/
highlight          : rouge
excerpt_separator  : "<!--more-->"
include            : ['.htaccess']
# Exclude these files from your production _site
exclude:
    - .sass-cache
    - Gemfile
    - Gemfile.lock
    - LICENSE
    - README.md
    - INSTALL.md
    - vendor
    - s3_website.yml
    - jekyll-theme-feeling-responsive.gemspec


# The language setting is used in /includes/header.html for html-settings
language: 'en'


# Used › default.html front-matter and compress.html
# Options › http://jch.penibelst.de
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  profile: false
  ignore:
    envs: [development]


#
#       ____       ____            ____
#      / __ \___  / __/___ ___  __/ / /_
